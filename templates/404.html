<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      max-width: 600px;
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-size: 120px;
      font-weight: 700;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      text-decoration: none;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(0, 198, 255, 0.6);
    }

    /* Floating circles animation */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      animation: float 10s infinite ease-in-out;
    }

    .circle:nth-child(1) {
      width: 200px;
      height: 200px;
      top: 10%;
      left: 10%;
    }

    .circle:nth-child(2) {
      width: 150px;
      height: 150px;
      bottom: 15%;
      right: 15%;
      animation-delay: 3s;
    }

    .circle:nth-child(3) {
      width: 100px;
      height: 100px;
      top: 70%;
      left: 20%;
      animation-delay: 5s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-40px);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

  <!-- Background animation -->
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <div class="container">
    <h1>404</h1>

    <h2>Oops! Page Not Found 😢</h2>

    <p>
      நீங்கள் தேடும் பக்கம் கிடைக்கவில்லை...<br>
      ஆனால் கவலைப்பட வேண்டாம் — உங்கள் பயணம் இங்கே முடிவதில்லை!
    </p>

    <a href="/" class="btn">🏠 Back to Home</a>
  </div>

</body>
</html>
